<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAM | Urban Air Mobility</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color: white;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
}
.logo { font-size: 24px; font-weight: bold; color: #a855f7; }
nav a { margin: 0 10px; color: white; text-decoration: none; }

select {
  background: #111;
  color: white;
  border: none;
  padding: 5px;
}

.hero { text-align: center; padding: 120px 20px; }
.hero h1 { font-size: 42px; }
.hero p { opacity: 0.8; }

.section { padding: 60px 20px; text-align: center; }

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap: 20px;
  margin-top: 30px;
}
.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 12px;
}
</style>
</head>

<body>

<header>
  <div class="logo">UAM</div>
  <div>
    <select onchange="setLang(this.value)">
      <option value="en">English</option>
      <option value="ko">한국어</option>
      <option value="zh">中文</option>
      <option value="ar">العربية</option>
      <option value="hi">हिन्दी</option>
      <option value="es">Español</option>
    </select>
  </div>
</header>

<section class="hero">
  <h1 id="title"></h1>
  <p id="subtitle"></p>
</section>

<section class="section">
  <h2 id="about_title"></h2>
  <p id="about_text"></p>
</section>

<section class="section">
  <h2 id="feature_title"></h2>
  <div class="cards">
    <div class="card"><h3 id="f1"></h3></div>
    <div class="card"><h3 id="f2"></h3></div>
    <div class="card"><h3 id="f3"></h3></div>
    <div class="card"><h3 id="f4"></h3></div>
  </div>
</section>

<script>
const data = {
  en: {
    title:"Urban Air Mobility",
    subtitle:"The Future of Transportation is in the Sky",
    about_title:"About UAM",
    about_text:"UAM uses eVTOL aircraft to move people and goods across cities quickly.",
    feature_title:"Key Features",
    f1:"eVTOL Aircraft",
    f2:"Zero Emissions",
    f3:"Fast Mobility",
    f4:"Smart Integration"
  },
  ko: {
    title:"도심 항공 모빌리티",
    subtitle:"미래 교통은 하늘에 있습니다",
    about_title:"UAM 소개",
    about_text:"UAM은 도심에서 사람과 물류를 빠르게 이동시키는 차세대 항공 교통입니다.",
    feature_title:"핵심 기능",
    f1:"eVTOL 항공기",
    f2:"무공해 이동",
    f3:"초고속 이동",
    f4:"스마트 도시 연동"
  },
  zh: {
    title:"城市空中交通",
    subtitle:"未来交通在天空",
    about_title:"关于UAM",
    about_text:"UAM利用电动垂直起降飞机在城市中快速运输人员和货物。",
    feature_title:"核心功能",
    f1:"电动垂直起降",
    f2:"零排放",
    f3:"高速移动",
    f4:"智能集成"
  },
  ar: {
    title:"النقل الجوي الحضري",
    subtitle:"مستقبل النقل في السماء",
    about_title:"حول UAM",
    about_text:"UAM يستخدم طائرات كهربائية لنقل الأشخاص والبضائع بسرعة.",
    feature_title:"الميزات",
    f1:"إقلاع عمودي",
    f2:"انبعاثات صفرية",
    f3:"سرعة عالية",
    f4:"تكامل ذكي"
  },
  hi: {
    title:"शहरी हवाई गतिशीलता",
    subtitle:"भविष्य का परिवहन आसमान में है",
    about_title:"UAM के बारे में",
    about_text:"UAM शहरों में लोगों और सामान को तेजी से ले जाता है।",
    feature_title:"मुख्य विशेषताएं",
    f1:"eVTOL विमान",
    f2:"शून्य प्रदूषण",
    f3:"तेज़ गति",
    f4:"स्मार्ट सिस्टम"
  },
  es: {
    title:"Movilidad Aérea Urbana",
    subtitle:"El futuro del transporte está en el cielo",
    about_title:"Sobre UAM",
    about_text:"UAM usa aeronaves eléctricas para transporte rápido en ciudades.",
    feature_title:"Características",
    f1:"Aeronaves eVTOL",
    f2:"Cero emisiones",
    f3:"Alta velocidad",
    f4:"Integración inteligente"
  }
};

function setLang(lang){
  localStorage.setItem("lang",lang);
  applyLang(lang);
}

function applyLang(lang){
  const d = data[lang];
  for(let key in d){
    document.getElementById(key).innerText = d[key];
  }
}

const userLang = navigator.language.slice(0,2);
const savedLang = localStorage.getItem("lang");
const defaultLang = savedLang || (data[userLang] ? userLang : "en");

applyLang(defaultLang);
</script>

</body>
</html>
